name: Update World Cup Standings

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:          # lets you click "Run workflow" manually in GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Run tracker
        run: python world_cup_tracker.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html wc_games.json
          git diff --staged --quiet || git commit -m "Update standings $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
